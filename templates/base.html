{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tourism Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Tourism Portal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <!-- Period links will be injected here as top-level nav items by JS -->
            <span id="periods-links"></span>
            <!-- category-specific links removed -->
          </ul>
        </div>
      </div>
    </nav>
    <!-- Secondary city navigation bar (different color) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
      <div class="container-fluid">
        <div class="collapse navbar-collapse" id="cityNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><span class="nav-link disabled">Ancient Cities</span></li>
            <li class="nav-item"><a class="nav-link" href="/cities/durres/">Durrës</a></li>
            <li class="nav-item"><a class="nav-link" href="/cities/apollonia/">Apollonia</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Tertiary navigation: single page listing all basilicas -->
    <nav class="navbar navbar-expand-lg navbar-light bg-info">
      <div class="container-fluid">
        <div class="collapse navbar-collapse" id="religionNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><span class="nav-link disabled">Religious Monuments</span></li>
            <li class="nav-item"><a class="nav-link" href="/religious/basilicas/">Basilicas</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-4">
      {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1FQ784/j6cY/iJTQUOhcWr7x9Jv+6DkLtS3qm9Ekf" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>
    <script src="{% static 'js/map-openlayers.js' %}"></script>
    <!-- dropdown auto-init removed as requested -->
  </body>
</html>
